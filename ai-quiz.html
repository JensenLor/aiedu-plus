<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青少年人工智能基础知识竞赛答题系统 - 罗辑智造社</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 答题系统专用样式 - 修复颜色对比度问题 */
        :root {
            --quiz-primary: #e67e22;
            --quiz-primary-hover: #d35400;
            --quiz-correct: #27ae60;
            --quiz-wrong: #e74c3c;
            --quiz-unanswered: #e0e0e0;
            --quiz-bg: #f5f7fa;
            --quiz-card: #ffffff;
            --quiz-text: #2c3e50;
            --quiz-text-light: #7f8c8d;
            --quiz-loading: #2980b9;
            --quiz-error: #c0392b;
            --quiz-success: #1e8449;
        }
        
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background-color: var(--quiz-bg);
            color: var(--quiz-text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        
        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 10px;
        }
        
        /* 头部 */
        .quiz-header {
            background-color: var(--quiz-primary);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(230, 126, 34, 0.3);
        }
        .quiz-header h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0;
        }
        .quiz-header .summary {
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
        }
        
        /* 加载状态 - 修复颜色对比度 */
        .loading-wrapper {
            margin: 40px 0;
        }
        .loading-card {
            background: var(--quiz-card);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #e8e8e8;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #ecf0f1;
            border-top: 5px solid var(--quiz-loading);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--quiz-text);
        }
        .loading-desc {
            font-size: 15px;
            color: var(--quiz-text-light);
            margin-bottom: 20px;
            line-height: 1.8;
        }
        .loading-error {
            color: var(--quiz-error);
            font-weight: 600;
            background: #fdf2f2;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #f5c6cb;
        }
        .loading-success {
            color: var(--quiz-success);
            font-weight: 600;
            background: #f0fdf4;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #bbf7d0;
        }
        .retry-btn {
            padding: 12px 30px;
            background: var(--quiz-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .retry-btn:hover {
            background: var(--quiz-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(230, 126, 34, 0.4);
        }
        
        /* 筛选区域 */
        .filter-card {
            background: var(--quiz-card);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border: 1px solid #e8e8e8;
        }
        .filter-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--quiz-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tag-item {
            padding: 8px 18px;
            border-radius: 25px;
            border: 2px solid #e0e0e0;
            background: #f8f9fa;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tag-item:hover {
            border-color: var(--quiz-primary);
            background: #fff3e8;
        }
        .tag-item.active {
            background: var(--quiz-primary);
            color: white;
            border-color: var(--quiz-primary);
        }
        .btn-group {
            display: flex;
            gap: 12px;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: var(--quiz-primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--quiz-primary-hover);
        }
        .btn-default {
            background: #ecf0f1;
            color: var(--quiz-text);
        }
        .btn-default:hover {
            background: #d5dbdb;
        }
        
        /* 答题卡 */
        .answer-card {
            background: var(--quiz-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border: 1px solid #e8e8e8;
        }
        .answer-card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--quiz-primary);
        }
        .answer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 10px;
        }
        .answer-item {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .answer-item.unanswered {
            background: var(--quiz-unanswered);
            color: var(--quiz-text);
        }
        .answer-item.current {
            background: var(--quiz-primary);
            color: white;
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.3);
            transform: scale(1.1);
        }
        .answer-item.correct {
            background: var(--quiz-correct);
            color: white;
        }
        .answer-item.wrong {
            background: var(--quiz-wrong);
            color: white;
        }
        
        /* 题目区域 */
        .question-area {
            background: var(--quiz-card);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border: 1px solid #e8e8e8;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }
        .question-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--quiz-text);
        }
        .question-info {
            font-size: 13px;
            color: var(--quiz-text-light);
            background: #f8f9fa;
            padding: 5px 12px;
            border-radius: 15px;
        }
        .question-text {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid var(--quiz-primary);
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        .option-item {
            padding: 18px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .option-item:hover {
            border-color: var(--quiz-primary);
            background: #fff3e8;
        }
        .option-item.selected {
            border-color: var(--quiz-primary);
            background: #fff3e8;
        }
        .option-item.correct {
            border-color: var(--quiz-correct);
            background: rgba(39, 174, 96, 0.1);
        }
        .option-item.wrong {
            border-color: var(--quiz-wrong);
            background: rgba(231, 76, 60, 0.1);
        }
        .option-label {
            font-weight: 700;
            color: var(--quiz-primary);
            min-width: 30px;
            font-size: 16px;
        }
        .option-text {
            font-size: 15px;
            line-height: 1.6;
            flex: 1;
        }
        
        /* 解析区域 */
        .analysis-area {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #ecf0f1;
            display: none;
        }
        .analysis-area.show {
            display: block;
        }
        .analysis-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--quiz-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .analysis-content {
            font-size: 14px;
            line-height: 1.8;
            color: var(--quiz-text);
            background: #f8f9fa;
            padding: 18px;
            border-radius: 8px;
            border-left: 4px solid var(--quiz-primary);
        }
        
        /* 导航按钮 */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #ecf0f1;
        }
        
        /* 隐藏答题区域 */
        .quiz-area {
            display: none;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .quiz-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .answer-grid {
                grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            }
            .answer-item {
                width: 40px;
                height: 40px;
                font-size: 14px;
            }
            .nav-buttons {
                flex-direction: column;
            }
            .nav-buttons .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <!-- 头部 -->
        <div class="quiz-header">
            <h1>🧠 青少年人工智能基础知识竞赛答题系统</h1>
            <div class="summary" id="header-summary">准备就绪</div>
        </div>

        <!-- 加载状态 -->
        <div class="loading-wrapper" id="loading-wrapper">
            <div class="loading-card">
                <div class="loading-spinner" id="loading-spinner"></div>
                <h2 class="loading-title" id="loading-title">正在加载题库...</h2>
                <p class="loading-desc" id="loading-desc">系统正在从服务器获取题库数据，请稍候...</p>
                <div id="loading-status"></div>
            </div>
        </div>

        <!-- 答题区域 -->
        <div class="quiz-area" id="quiz-area">
            <!-- 筛选区域 -->
            <div class="filter-card">
                <h3 class="filter-title">📋 筛选题目</h3>
                <div class="tag-group">
                    <span class="tag-item active" data-dimension="all">全部维度</span>
                    <span class="tag-item" data-dimension="人工智能意识">人工智能意识</span>
                    <span class="tag-item" data-dimension="人工智能思维">人工智能思维</span>
                    <span class="tag-item" data-dimension="人工智能应用与创新能力">应用与创新</span>
                    <span class="tag-item" data-dimension="人工智能社会责任">社会责任</span>
                </div>
                <div class="tag-group">
                    <span class="tag-item active" data-type="all">全部题型</span>
                    <span class="tag-item" data-type="single">单选题</span>
                    <span class="tag-item" data-type="multiple">多选题</span>
                    <span class="tag-item" data-type="judge">判断题</span>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="applyFilter()">✓ 应用筛选</button>
                    <button class="btn btn-default" onclick="resetFilter()">↺ 重置</button>
                </div>
            </div>

            <!-- 答题卡 -->
            <div class="answer-card">
                <h3 class="answer-card-title">📝 答题卡</h3>
                <div class="answer-grid" id="answer-grid"></div>
            </div>

            <!-- 题目区域 -->
            <div class="question-area">
                <div class="question-header">
                    <h2 class="question-title" id="question-title">题目</h2>
                    <div class="question-info" id="question-info"></div>
                </div>
                <div class="question-text" id="question-text"></div>
                <div class="options-list" id="options-list"></div>
                <div class="analysis-area" id="analysis-area">
                    <h3 class="analysis-title">💡 答案解析</h3>
                    <div class="analysis-content" id="analysis-content"></div>
                </div>
                <div class="nav-buttons">
                    <button class="btn btn-default" onclick="prevQuestion()">← 上一题</button>
                    <button class="btn btn-primary" onclick="nextQuestion()">下一题 →</button>
                    <button class="btn btn-default" onclick="showAnswer()">👁 查看答案</button>
                    <button class="btn btn-default" onclick="resetQuiz()">🔄 重新开始</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let allQuestions = [];
        let filteredQuestions = [];
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let selectedDimension = "all", selectedType = "all";

        // 配置
        const CACHE_KEY = "ai_question_bank_cache_v2";
        const CACHE_TIMESTAMP_KEY = "ai_question_bank_timestamp_v2";
        const CACHE_DURATION = 24 * 60 * 60 * 1000;

        // CSV文件路径 - 使用绝对URL
        const CSV_FILE_PATH = window.location.origin + "/data/ai-quiz-data.csv";

        // 页面加载初始化
        document.addEventListener("DOMContentLoaded", function() {
            loadQuestionBank();
        });

        // 加载题库
        function loadQuestionBank() {
            // 首先尝试从缓存加载
            if (isCacheValid()) {
                const cachedQuestions = loadFromCache();
                if (cachedQuestions && cachedQuestions.length > 0) {
                    updateLoadingStatus("从缓存加载", `成功加载 ${cachedQuestions.length} 道题目`, false);
                    setTimeout(() => initializeQuiz(cachedQuestions), 1200);
                    return;
                }
            }
            
            // 从服务器加载题库
            updateLoadingStatus("正在加载题库...", `从服务器获取题库数据<br>路径: ${CSV_FILE_PATH}`, false);
            
            console.log("尝试加载CSV:", CSV_FILE_PATH);
            
            fetch(CSV_FILE_PATH)
                .then(response => {
                    console.log("响应状态:", response.status, response.statusText);
                    if (!response.ok) {
                        throw new Error(`HTTP错误: ${response.status} (${response.statusText})`);
                    }
                    return response.text();
                })
                .then(text => {
                    console.log("CSV内容长度:", text.length, "字符");
                    const questions = parseCSV(text);
                    saveToCache(questions);
                    updateLoadingStatus("加载成功", `成功加载 ${questions.length} 道题目！`, false);
                    setTimeout(() => initializeQuiz(questions), 1500);
                })
                .catch(error => {
                    console.error("加载失败:", error);
                    updateLoadingStatus("加载失败", `无法加载题库文件<br><br>错误信息: ${error.message}<br><br>可能原因：<br>1. CSV文件不存在或路径错误<br>2. 网络连接问题<br>3. 服务器暂时不可用`, true);
                });
        }

        // 加载状态更新
        function updateLoadingStatus(status, message, isError = false) {
            document.getElementById("loading-title").textContent = status;
            document.getElementById("loading-desc").innerHTML = message;
            
            const statusEl = document.getElementById("loading-status");
            
            if (isError) {
                statusEl.innerHTML = `<div class="loading-error">⚠️ ${message}</div>`;
                document.getElementById("loading-spinner").style.display = "none";
                
                // 添加重试按钮
                if (!document.querySelector('.retry-btn')) {
                    const retryBtn = document.createElement("button");
                    retryBtn.className = "retry-btn";
                    retryBtn.textContent = "🔄 重新尝试加载";
                    retryBtn.onclick = function() {
                        document.getElementById("loading-spinner").style.display = "block";
                        statusEl.innerHTML = "";
                        loadQuestionBank();
                    };
                    statusEl.appendChild(retryBtn);
                }
            } else {
                statusEl.innerHTML = `<div class="loading-success">✓ ${message}</div>`;
            }
        }

        // 缓存管理
        function isCacheValid() {
            const timestamp = localStorage.getItem(CACHE_TIMESTAMP_KEY);
            if (!timestamp) return false;
            return (Date.now() - parseInt(timestamp)) < CACHE_DURATION;
        }
        
        function loadFromCache() {
            try {
                const cachedData = localStorage.getItem(CACHE_KEY);
                return cachedData ? JSON.parse(cachedData) : null;
            } catch (e) {
                console.warn("缓存数据解析失败:", e);
                localStorage.removeItem(CACHE_KEY);
                localStorage.removeItem(CACHE_TIMESTAMP_KEY);
                return null;
            }
        }
        
        function saveToCache(data) {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify(data));
                localStorage.setItem(CACHE_TIMESTAMP_KEY, Date.now().toString());
            } catch (e) {
                console.warn("缓存保存失败:", e);
            }
        }

        // CSV解析 - 处理带引号的CSV格式
        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length < 2) throw new Error("CSV文件格式错误：文件为空或只有标题行");
            
            const questions = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                // 解析CSV行（处理引号内的逗号）
                const parts = parseCSVLine(line);
                
                if (parts.length < 7) {
                    console.warn(`跳过第${i+1}行，数据不完整: ${parts.length}个字段`);
                    continue;
                }
                
                const question = {
                    id: parseInt(parts[0]) || (i),
                    dimension: parts[1] || "未分类",
                    type: parts[2] || "single",
                    typeName: parts[3] || "单选题",
                    title: parts[4] || "",
                    options: parts[5] ? parts[5].split(",") : [],
                    correct: parts[6] ? parts[6].split(",") : [],
                    analysis: parts[7] || "暂无解析"
                };
                
                // 清理选项和答案中的引号
                question.options = question.options.map(o => o.replace(/^"|"$/g, '').trim());
                question.correct = question.correct.map(c => c.replace(/^"|"$/g, '').trim());
                
                if (question.title && question.options.length > 0) {
                    questions.push(question);
                }
            }
            
            if (questions.length === 0) throw new Error("CSV文件中没有有效的题目数据");
            return questions;
        }
        
        // 解析CSV行（处理引号内的逗号）
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            
            return result;
        }

        // 初始化答题系统
        function initializeQuiz(questions) {
            allQuestions = questions;
            filteredQuestions = [...questions];
            userAnswers = {};
            
            // 更新头部统计
            updateHeaderStats();
            
            // 初始化筛选标签
            initFilterTags();
            
            // 初始化答题卡
            initAnswerCard();
            
            // 显示第一题
            showQuestion(0);
            
            // 切换到答题界面
            setTimeout(() => {
                document.getElementById("loading-wrapper").style.display = "none";
                document.getElementById("quiz-area").style.display = "block";
            }, 500);
        }

        // 更新头部统计
        function updateHeaderStats() {
            const total = filteredQuestions.length;
            const answered = Object.keys(userAnswers).length;
            const correct = Object.values(userAnswers).filter(a => a.isCorrect).length;
            document.getElementById("header-summary").innerHTML = 
                `📊 已答: <strong>${answered}/${total}</strong> | ✅ 正确: <strong>${correct}</strong>`;
        }

        // 初始化筛选标签
        function initFilterTags() {
            // 维度标签
            document.querySelectorAll('[data-dimension]').forEach(tag => {
                tag.addEventListener('click', function() {
                    document.querySelectorAll('[data-dimension]').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    selectedDimension = this.dataset.dimension;
                });
            });
            
            // 题型标签
            document.querySelectorAll('[data-type]').forEach(tag => {
                tag.addEventListener('click', function() {
                    document.querySelectorAll('[data-type]').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    selectedType = this.dataset.type;
                });
            });
        }

        // 应用筛选
        function applyFilter() {
            filteredQuestions = allQuestions.filter(q => {
                const dimensionMatch = selectedDimension === "all" || q.dimension === selectedDimension;
                const typeMatch = selectedType === "all" || q.type === selectedType;
                return dimensionMatch && typeMatch;
            });
            
            if (filteredQuestions.length === 0) {
                alert("没有符合条件的题目，请调整筛选条件！");
                filteredQuestions = [...allQuestions];
                return;
            }
            
            currentQuestionIndex = 0;
            initAnswerCard();
            showQuestion(0);
            updateHeaderStats();
        }

        // 重置筛选
        function resetFilter() {
            selectedDimension = "all";
            selectedType = "all";
            document.querySelectorAll('[data-dimension]').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('[data-type]').forEach(t => t.classList.remove('active'));
            document.querySelector('[data-dimension="all"]').classList.add('active');
            document.querySelector('[data-type="all"]').classList.add('active');
            
            filteredQuestions = [...allQuestions];
            currentQuestionIndex = 0;
            initAnswerCard();
            showQuestion(0);
            updateHeaderStats();
        }

        // 初始化答题卡
        function initAnswerCard() {
            const grid = document.getElementById("answer-grid");
            grid.innerHTML = "";
            
            filteredQuestions.forEach((q, index) => {
                const item = document.createElement("div");
                item.className = "answer-item unanswered";
                item.textContent = index + 1;
                item.onclick = () => showQuestion(index);
                
                if (userAnswers[q.id]) {
                    item.classList.remove("unanswered");
                    item.classList.add(userAnswers[q.id].isCorrect ? "correct" : "wrong");
                }
                
                if (index === currentQuestionIndex) {
                    item.classList.add("current");
                }
                
                grid.appendChild(item);
            });
        }

        // 显示题目
        function showQuestion(index) {
            if (index < 0 || index >= filteredQuestions.length) return;
            
            currentQuestionIndex = index;
            const question = filteredQuestions[index];
            
            // 更新答题卡
            document.querySelectorAll(".answer-item").forEach((item, i) => {
                item.classList.remove("current");
                if (i === index) item.classList.add("current");
            });
            
            // 更新题目信息
            document.getElementById("question-title").textContent = `📖 第 ${index + 1} 题`;
            document.getElementById("question-info").textContent = `${question.dimension} · ${question.typeName}`;
            document.getElementById("question-text").textContent = question.title;
            
            // 更新选项
            const optionsList = document.getElementById("options-list");
            optionsList.innerHTML = "";
            
            const labels = ["A", "B", "C", "D", "E", "F"];
            
            question.options.forEach((option, i) => {
                const optionItem = document.createElement("div");
                optionItem.className = "option-item";
                
                const label = labels[i] || String.fromCharCode(65 + i);
                
                optionItem.innerHTML = `
                    <span class="option-label">${label}.</span>
                    <span class="option-text">${option}</span>
                `;
                
                // 检查是否已选择
                if (userAnswers[question.id]) {
                    const userAnswer = userAnswers[question.id];
                    const isSelected = userAnswer.selected.includes(label);
                    const isCorrect = question.correct.includes(label);
                    
                    if (isSelected) {
                        optionItem.classList.add("selected");
                        if (userAnswer.isCorrect !== undefined) {
                            optionItem.classList.add(isCorrect ? "correct" : "wrong");
                        }
                    } else if (userAnswer.isCorrect !== undefined && isCorrect) {
                        optionItem.classList.add("correct");
                    }
                }
                
                optionItem.onclick = () => selectOption(label, question);
                optionsList.appendChild(optionItem);
            });
            
            // 更新解析区域
            const analysisArea = document.getElementById("analysis-area");
            const analysisContent = document.getElementById("analysis-content");
            
            if (userAnswers[question.id] && userAnswers[question.id].isCorrect !== undefined) {
                analysisContent.textContent = question.analysis || "暂无解析";
                analysisArea.classList.add("show");
            } else {
                analysisArea.classList.remove("show");
            }
        }

        // 选择选项
        function selectOption(optionLabel, question) {
            // 如果已经查看过答案，不允许修改
            if (userAnswers[question.id] && userAnswers[question.id].isCorrect !== undefined) {
                return;
            }
            
            const isMultiple = question.type === "multiple";
            let selected = userAnswers[question.id] ? [...userAnswers[question.id].selected] : [];
            
            if (isMultiple) {
                // 多选题：切换选择状态
                const index = selected.indexOf(optionLabel);
                if (index === -1) {
                    selected.push(optionLabel);
                } else {
                    selected.splice(index, 1);
                }
            } else {
                // 单选题和判断题：单选
                selected = [optionLabel];
            }
            
            userAnswers[question.id] = {
                selected: selected,
                isCorrect: undefined // 尚未验证
            };
            
            // 更新显示
            showQuestion(currentQuestionIndex);
            updateHeaderStats();
            
            // 更新答题卡
            const answerItems = document.querySelectorAll(".answer-item");
            if (answerItems[currentQuestionIndex]) {
                answerItems[currentQuestionIndex].classList.remove("unanswered", "wrong");
                answerItems[currentQuestionIndex].classList.add("wrong"); // 暂时标记为错误，直到验证
            }
        }

        // 查看答案
        function showAnswer() {
            const question = filteredQuestions[currentQuestionIndex];
            if (!question) return;
            
            // 如果没有选择答案，自动选择正确答案（用于学习）
            if (!userAnswers[question.id]) {
                userAnswers[question.id] = {
                    selected: [...question.correct],
                    isCorrect: true
                };
            } else {
                // 验证答案
                const userAnswer = userAnswers[question.id];
                const isCorrect = arraysEqual(userAnswer.selected.sort(), question.correct.sort());
                userAnswers[question.id].isCorrect = isCorrect;
            }
            
            // 更新显示
            showQuestion(currentQuestionIndex);
            updateHeaderStats();
            
            // 更新答题卡
            const answerItems = document.querySelectorAll(".answer-item");
            if (answerItems[currentQuestionIndex]) {
                answerItems[currentQuestionIndex].classList.remove("unanswered", "wrong");
                answerItems[currentQuestionIndex].classList.add(
                    userAnswers[question.id].isCorrect ? "correct" : "wrong"
                );
            }
        }

        // 数组比较
        function arraysEqual(a, b) {
            if (a.length !== b.length) return false;
            for (let i = 0; i < a.length; i++) {
                if (a[i] !== b[i]) return false;
            }
            return true;
        }

        // 上一题
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                showQuestion(currentQuestionIndex - 1);
            } else {
                alert("已经是第一题了！");
            }
        }

        // 下一题
        function nextQuestion() {
            if (currentQuestionIndex < filteredQuestions.length - 1) {
                showQuestion(currentQuestionIndex + 1);
            } else {
                alert("已经是最后一题了！");
            }
        }

        // 重新开始
        function resetQuiz() {
            if (confirm("确定要重新开始吗？所有答题记录将被清空。")) {
                userAnswers = {};
                currentQuestionIndex = 0;
                initAnswerCard();
                showQuestion(0);
                updateHeaderStats();
            }
        }
    </script>
</body>
</html>
