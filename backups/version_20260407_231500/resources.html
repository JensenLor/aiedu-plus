<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习资源 - 罗辑智造社</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --font-hand: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
        }

        .nav-logo {
            width: 50px;
            height: 50px;
            border-radius: 0;
            border: none;
            box-shadow: none;
            object-fit: contain;
        }

        .page-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title h1 {
            font-size: 42px;
            margin-bottom: 0;
        }

        .resource-container {
            display: flex;
            gap: 26px;
            margin-top: 20px;
            align-items: flex-start;
        }

        .resource-nav {
            flex: 0 0 212px;
            background: rgba(255, 255, 255, 0.92);
            padding: 20px 18px;
            border-radius: 18px;
            box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.08);
            border: 2px solid var(--border-color);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .resource-nav h3 {
            font-size: 20px;
            margin-bottom: 16px;
            color: var(--primary-color);
            padding-bottom: 8px;
            border-bottom: 1px dashed rgba(230, 126, 34, 0.55);
        }

        .nav-items {
            list-style: none;
        }

        .nav-items li + li {
            margin-top: 8px;
        }

        .nav-items a {
            display: block;
            padding: 10px 12px;
            text-decoration: none;
            color: var(--text-dark);
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            transition: background-color 0.25s ease, color 0.25s ease, border-color 0.25s ease;
            border: 1px solid transparent;
        }

        .nav-items a:hover {
            background: #FFF7ED;
            color: var(--primary-color);
            border-color: rgba(230, 126, 34, 0.2);
        }

        .nav-items a.active {
            background: #FFF3E0;
            color: var(--text-dark);
            border-color: var(--secondary-color);
        }

        .resource-main {
            flex: 1;
            min-width: 0;
        }

        .status-box,
        .empty-state {
            background: white;
            border: 3px solid var(--border-color);
            box-shadow: 4px 4px 0px var(--shadow-color);
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 22px;
        }

        .status-box {
            color: var(--text-medium);
        }

        .status-box.error {
            color: #B00020;
            background: #FFF5F5;
        }

        .empty-state h3 {
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--text-medium);
        }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 24px;
        }

        .resource-card {
            position: relative;
            background: var(--card-bg);
            border-radius: 18px;
            padding: 22px;
            border: 3px solid var(--border-color);
            box-shadow: 4px 4px 0px var(--shadow-color);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 224px;
            height: 100%;
            text-decoration: none;
            color: inherit;
            overflow: hidden;
        }

        .resource-card:hover {
            transform: translateY(-4px);
            box-shadow: 6px 6px 0px var(--shadow-color);
        }

        .resource-card:focus-visible {
            outline: 3px solid var(--secondary-color);
            outline-offset: 4px;
        }

        .resource-card.resource-card-static {
            cursor: default;
        }

        .resource-card.resource-card-static:hover {
            transform: none;
            box-shadow: 4px 4px 0px var(--shadow-color);
        }

        .card-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--accent-color);
            color: var(--text-dark);
            border: 2px solid var(--border-color);
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 700;
        }

        .card-icon {
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: #FFF3E0;
            border-radius: 16px;
            border: 2px dashed var(--secondary-color);
            margin-bottom: 6px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .card-icon.card-icon-media {
            background: white;
            border-style: solid;
            border-color: rgba(230, 126, 34, 0.22);
            padding: 10px;
        }

        .card-icon-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .card-icon-fallback {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .card-icon.icon-failed {
            background: #FFF3E0;
            border: 2px dashed var(--secondary-color);
            padding: 0;
        }

        .card-icon.icon-failed .card-icon-image {
            display: none;
        }

        .card-icon.icon-failed .card-icon-fallback {
            display: flex;
        }

        .card-title {
            font-size: 20px;
            line-height: 1.5;
            color: var(--text-dark);
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 3em;
        }

        .card-description {
            font-size: 14px;
            color: var(--text-medium);
            line-height: 1.75;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 5.25em;
        }

        @media (max-width: 992px) {
            .resource-container {
                flex-direction: column;
            }

            .resource-nav {
                width: 100%;
                position: static;
            }
        }

        @media (max-width: 768px) {
            .page-title h1 {
                font-size: 36px;
            }

            .resource-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <div class="nav-brand">
                <img src="images/罗辑智造社二次元头部形象.png" alt="Logo" class="nav-logo">
                <span class="nav-title">罗辑智造社</span>
            </div>
            <ul>
                <li><a href="index.html">🏠 首页</a></li>
                <li><a href="resources.html" class="active">🎓 学习资源</a></li>
                <li><a href="works.html">MakerVerse</a></li>
            </ul>
        </nav>

        <div class="page-title">
            <h1>🎓 学习资源库</h1>
        </div>

        <div class="resource-container">
            <aside class="resource-nav">
                <h3>📚 分类导航</h3>
                <ul id="categoryNav" class="nav-items"></ul>
            </aside>

            <main class="resource-main">
                <div id="resourceStatus" class="status-box">正在读取资料数据...</div>

                <section id="emptyState" class="empty-state" hidden>
                    <h3>这个分类暂时还没有内容</h3>
                    <p>你可以直接去 <code>data/resources.csv</code> 新增一行资料，保存后页面就会自动显示。</p>
                </section>

                <section id="resourceGrid" class="resource-grid"></section>
            </main>
        </div>

        <footer>
            <p>📧 联系邮箱：402479707@qq.com | 🌐 域名：www.aiedu.plus</p>
            <p>© 2026 罗辑智造社 - 让前沿科技触手可及</p>
        </footer>
    </div>

    <script src="js/resources-page.js"></script>
</body>
</html>
