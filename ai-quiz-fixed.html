<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青少年人工智能基础知识竞赛答题系统</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft YaHei", sans-serif; }
        :root {
            --color-unanswered: #e0e0e0;
            --color-correct: #27ae60;
            --color-wrong: #e74c3c;
            --color-primary: #e67e22;
            --color-primary-hover: #d35400;
            --color-bg: #f5f7fa;
            --color-card: #ffffff;
            --color-text: #2c3e50;
            --color-text-light: #7f8c8d;
        }
        body { background-color: var(--color-bg); color: var(--color-text); min-height: 100vh; padding-bottom: 40px; }
        
        /* 顶部导航栏 */
        .header {
            background-color: var(--color-primary);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header h1 { font-size: 18px; font-weight: 500; }
        .header .summary { font-size: 14px; }
        
        /* 筛选区域 */
        .filter-wrapper { max-width: 1200px; margin: 20px auto 0; padding: 0 20px; }
        .filter-card { background: var(--color-card); border-radius: 8px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .filter-title { font-size: 16px; font-weight: 500; margin-bottom: 15px; color: var(--color-primary); }
        .filter-group { margin-bottom: 15px; }
        .filter-group:last-child { margin-bottom: 0; }
        .filter-label { font-size: 14px; font-weight: 500; margin-bottom: 10px; display: block; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag-item {
            padding: 6px 15px; border-radius: 20px; border: 1px solid #ddd;
            background: #f8f9fa; font-size: 14px; cursor: pointer;
            transition: all 0.2s; user-select: none;
        }
        .tag-item:hover { border-color: var(--color-primary); background: #fff3e8; }
        .tag-item.active { background: var(--color-primary); color: white; border-color: var(--color-primary); }
        .filter-btn-group { margin-top: 15px; display: flex; gap: 10px; }
        .filter-btn {
            padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px;
            cursor: pointer; transition: all 0.2s;
        }
        .filter-btn.primary { background: var(--color-primary); color: white; }
        .filter-btn.primary:hover { background: var(--color-primary-hover); }
        .filter-btn.default { background: #ecf0f1; color: var(--color-text); }
        .filter-btn.default:hover { background: #bdc3c7; }
        
        /* 答题卡面板 */
        .answer-card-wrapper {
            position: fixed; top: 60px; right: 20px; width: 280px;
            background: var(--color-card); border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 15px;
            max-height: calc(100vh - 80px); overflow-y: auto; z-index: 99;
        }
        .answer-card-wrapper h3 { font-size: 16px; margin-bottom: 12px; color: var(--color-primary); }
        .card-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-bottom: 15px; }
        .card-item {
            width: 100%; aspect-ratio: 1/1; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; background-color: var(--color-unanswered);
            cursor: pointer; transition: all 0.2s; user-select: none;
        }
        .card-item:hover { transform: scale(1.1); }
        .card-item.correct { background-color: var(--color-correct); color: white; }
        .card-item.wrong { background-color: var(--color-wrong); color: white; }
        .card-item.current { border: 2px solid var(--color-primary); }
        .card-status-desc { display: flex; gap: 12px; font-size: 12px; flex-wrap: wrap; }
        .status-item { display: flex; align-items: center; gap: 4px; }
        .status-color { width: 12px; height: 12px; border-radius: 2px; }
        
        /* 主答题区域 */
        .main-container { max-width: 800px; margin: 20px auto 0; padding: 0 20px; margin-right: 320px; }
        .question-card { background: var(--color-card); border-radius: 12px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .question-header { display: flex; justify-content: space-between; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee; flex-wrap: wrap; gap: 8px; }
        .question-info { font-size: 14px; color: var(--color-text-light); }
        .question-info .tag { display: inline-block; padding: 3px 8px; border-radius: 4px; background: #fff3e8; color: var(--color-primary); margin-right: 8px; font-size: 12px; }
        .question-title { font-size: 18px; line-height: 1.6; margin-bottom: 20px; font-weight: 500; }
        
        /* 选项样式 */
        .options-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .option-item {
            display: flex; align-items: flex-start; gap: 10px; padding: 12px 15px;
            border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        .option-item:hover { border-color: var(--color-primary); background: #fffbf8; }
        .option-item.selected { border-color: var(--color-primary); background: #fff3e8; }
        .option-item.correct { border-color: var(--color-correct); background: #e8f5e9; }
        .option-item.wrong { border-color: var(--color-wrong); background: #fdecea; }
        .option-item.disabled { pointer-events: none; }
        .option-input { margin-top: 3px; flex-shrink: 0; }
        .option-text { line-height: 1.5; }
        
        /* 按钮样式 */
        .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 10px 25px; border: none; border-radius: 6px; font-size: 16px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: var(--color-primary); color: white; }
        .btn-primary:hover { background: var(--color-primary-hover); }
        .btn-default { background: #ecf0f1; color: var(--color-text); }
        .btn-default:hover { background: #bdc3c7; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 解析区域 */
        .analysis-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; display: none; }
        .analysis-title { font-size: 16px; font-weight: 500; margin-bottom: 12px; color: var(--color-primary); }
        .analysis-content { font-size: 14px; line-height: 1.7; color: var(--color-text); background: #f8f9fa; padding: 15px; border-radius: 8px; }
        
        /* 加载状态 */
        .loading-wrapper { max-width: 900px; margin: 60px auto; padding: 0 20px; }
        .loading-card { background: var(--color-card); border-radius: 12px; padding: 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        .loading-spinner { width: 50px; height: 50px; border: 5px solid #ecf0f1; border-top: 5px solid var(--color-primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 25px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-title { font-size: 22px; font-weight: 600; margin-bottom: 15px; color: #2c3e50; }
        .loading-desc { font-size: 15px; color: #7f8c8d; margin-bottom: 20px; line-height: 1.8; }
        .loading-status { margin-top: 15px; }
        .loading-error { color: #e74c3c; font-weight: 600; }
        .loading-success { color: #27ae60; font-weight: 600; }
        .retry-btn { padding: 12px 30px; background: var(--color-primary); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 15px; transition: all 0.3s; }
        .retry-btn:hover { background: var(--color-primary-hover); }
        
        /* 响应式设计 */
        @media (max-width: 1100px) {
            .answer-card-wrapper { position: static; width: 100%; margin-bottom: 20px; }
            .main-container { margin-right: 0; max-width: 100%; }
            .filter-wrapper { max-width: 100%; }
        }
        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .question-card { padding: 20px; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; }
            .card-grid { grid-template-columns: repeat(8, 1fr); }
        }
        
        /* 隐藏区域 */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="header">
        <h1>🧠 青少年人工智能基础知识竞赛答题系统</h1>
        <div class="summary" id="header-summary">已答: 0/0 | 正确: 0</div>
    </div>

    <!-- 加载状态 -->
    <div class="loading-wrapper" id="loading-wrapper">
        <div class="loading-card">
            <div class="loading-spinner"></div>
            <h2 class="loading-title" id="loading-title">正在加载题库...</h2>
            <p class="loading-desc" id="loading-desc">系统正在从服务器获取题库数据，请稍候...</p>
            <div class="loading-status" id="loading-status"></div>
        </div>
    </div>

    <!-- 答题区域 -->
    <div class="quiz-area hidden" id="quiz-area">
        <!-- 筛选区域 -->
        <div class="filter-wrapper">
            <div class="filter-card">
                <h3 class="filter-title">🎯 筛选题目</h3>
                <div class="filter-group">
                    <span class="filter-label">按维度筛选：</span>
                    <div class="tag-group" id="dimension-tags">
                        <span class="tag-item active" data-value="all">全部维度</span>
                        <span class="tag-item" data-value="人工智能意识">人工智能意识</span>
                        <span class="tag-item" data-value="人工智能思维">人工智能思维</span>
                        <span class="tag-item" data-value="人工智能应用与创新能力">人工智能应用与创新能力</span>
                        <span class="tag-item" data-value="人工智能社会责任">人工智能社会责任</span>
                    </div>
                </div>
                <div class="filter-group">
                    <span class="filter-label">按题型筛选：</span>
                    <div class="tag-group" id="type-tags">
                        <span class="tag-item active" data-value="all">全部题型</span>
                        <span class="tag-item" data-value="single">单选题</span>
                        <span class="tag-item" data-value="multiple">多选题</span>
                        <span class="tag-item" data-value="judge">判断题</span>
                    </div>
                </div>
                <div class="filter-btn-group">
                    <button class="filter-btn primary" onclick="applyFilter()">应用筛选</button>
                    <button class="filter-btn default" onclick="resetFilter()">重置筛选</button>
                </div>
            </div>
        </div>

        <!-- 答题卡 -->
        <div class="answer-card-wrapper">
            <h3>📋 答题卡</h3>
            <div class="card-grid" id="card-grid"></div>
            <div class="card-status-desc">
                <div class="status-item"><div class="status-color" style="background: #e0e0e0;"></div>未答</div>
                <div class="status-item"><div class="status-color" style="background: #27ae60;"></div>正确</div>
                <div class="status-item"><div class="status-color" style="background: #e74c3c;"></div>错误</div>
            </div>
        </div>

        <!-- 主答题区域 -->
        <div class="main-container">
            <div class="question-card">
                <div class="question-header">
                    <span id="question-number" style="font-weight: 600; color: var(--color-primary);">第 1 题</span>
                    <div class="question-info">
                        <span class="tag" id="dimension-tag">人工智能意识</span>
                        <span id="type-tag">单项选择题</span>
                    </div>
                </div>
                <div class="question-title" id="question-title">题目内容加载中...</div>
                <div class="options-container" id="options-container"></div>
                
                <!-- 解析区域 -->
                <div class="analysis-section" id="analysis-section">
                    <h4 class="analysis-title">📖 答案解析</h4>
                    <div class="analysis-content" id="analysis-content"></div>
                </div>
                
                <!-- 操作按钮 -->
                <div class="btn-group">
                    <button class="btn btn-default" id="prev-btn" onclick="prevQuestion()" disabled>← 上一题</button>
                    <button class="btn btn-primary" id="check-btn" onclick="checkAnswer()">查看答案</button>
                    <button class="btn btn-default" id="next-btn" onclick="nextQuestion()">下一题 →</button>
                    <button class="btn btn-default" onclick="resetQuiz()">重新开始</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let allQuestions = [];
        let filteredQuestions = [];
        let currentIndex = 0;
        let userAnswers = {};
        let selectedDimension = "all", selectedType = "all";

        // 缓存键名
        const CACHE_KEY = "ai_question_bank_data";
        const CACHE_TIME_KEY = "ai_question_bank_time";
        const CACHE_DURATION = 24 * 60 * 60 * 1000; // 24小时

        // 页面加载完成后初始化
        document.addEventListener("DOMContentLoaded", function() {
            initTagListeners();
            loadQuestionBank();
        });

        // 初始化标签点击事件
        function initTagListeners() {
            document.querySelectorAll("#dimension-tags .tag-item").forEach(tag => {
                tag.addEventListener("click", function() {
                    document.querySelectorAll("#dimension-tags .tag-item").forEach(t => t.classList.remove("active"));
                    this.classList.add("active");
                    selectedDimension = this.dataset.value;
                });
            });
            
            document.querySelectorAll("#type-tags .tag-item").forEach(tag => {
                tag.addEventListener("click", function() {
                    document.querySelectorAll("#type-tags .tag-item").forEach(t => t.classList.remove("active"));
                    this.classList.add("active");
                    selectedType = this.dataset.value;
                });
            });
        }

        // 加载题库
        async function loadQuestionBank() {
            // 尝试从缓存加载
            const cachedData = loadFromCache();
            if (cachedData && cachedData.length > 0) {
                updateLoadingStatus("从缓存加载", `成功加载 ${cachedData.length} 道题目`);
                setTimeout(() => initializeQuiz(cachedData), 1000);
                return;
            }
            
            // 从服务器加载
            updateLoadingStatus("正在加载题库...", "正在从服务器获取题库数据...");
            
            try {
                const csvPath = window.location.origin + "/data/ai-quiz-data.csv";
                const response = await fetch(csvPath);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const csvText = await response.text();
                const questions = parseCSV(csvText);
                
                if (questions.length === 0) throw new Error("未解析到有效题目");
                
                saveToCache(questions);
                updateLoadingStatus("加载成功", `成功加载 ${questions.length} 道题目`);
                setTimeout(() => initializeQuiz(questions), 1000);
            } catch (error) {
                console.error("加载失败:", error);
                updateLoadingStatus("加载失败", error.message, true);
            }
        }

        // 加载状态更新
        function updateLoadingStatus(title, desc, isError = false) {
            document.getElementById("loading-title").textContent = title;
            document.getElementById("loading-desc").textContent = desc;
            
            const statusEl = document.getElementById("loading-status");
            if (isError) {
                statusEl.innerHTML = `
                    <div class="loading-error">❌ ${desc}</div>
                    <button class="retry-btn" onclick="retryLoad()">🔄 重试加载</button>
                `;
            } else {
                statusEl.innerHTML = `<div class="loading-success">✅ ${desc}</div>`;
            }
        }

        // 重试加载
        function retryLoad() {
            localStorage.removeItem(CACHE_KEY);
            localStorage.removeItem(CACHE_TIME_KEY);
            loadQuestionBank();
        }

        // 缓存管理
        function loadFromCache() {
            try {
                const data = localStorage.getItem(CACHE_KEY);
                const time = localStorage.getItem(CACHE_TIME_KEY);
                if (!data || !time) return null;
                if (Date.now() - parseInt(time) > CACHE_DURATION) return null;
                return JSON.parse(data);
            } catch (e) {
                console.error("缓存读取失败:", e);
                return null;
            }
        }
        function saveToCache(data) {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify(data));
                localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());
            } catch (e) {
                console.error("缓存保存失败:", e);
            }
        }

        // CSV解析
        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(line => line.trim());
            if (lines.length < 2) throw new Error("CSV文件为空或格式错误");
            
            const questions = [];
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                // 使用正则表达式解析CSV，处理引号内的逗号
                const parts = parseCSVLine(line);
                
                if (parts.length < 7) {
                    console.warn(`跳过第${i+1}行，数据不完整`);
                    continue;
                }
                
                // 清理引号
                const cleanParts = parts.map(p => p.replace(/^"+|"+$/g, '').trim());
                
                // 解析选项（逗号分隔）
                let options = [];
                if (cleanParts[5]) {
                    options = cleanParts[5].split(",").map(o => o.trim()).filter(o => o);
                }
                
                // 解析答案（逗号分隔）
                let correct = [];
                if (cleanParts[6]) {
                    correct = cleanParts[6].split(",").map(c => c.trim()).filter(c => c);
                }
                
                if (!cleanParts[4] || options.length === 0) continue;
                
                questions.push({
                    id: parseInt(cleanParts[0]) || i,
                    dimension: cleanParts[1] || "未分类",
                    type: cleanParts[2] || "single",
                    typeName: cleanParts[3] || "单选题",
                    title: cleanParts[4],
                    options: options,
                    correct: correct,
                    analysis: cleanParts[7] || "暂无解析"
                });
            }
            
            return questions;
        }

        // 解析CSV行（处理引号内的逗号）
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    // 处理CSV标准：两个连续引号表示一个引号
                    if (inQuotes && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            
            return result;
        }

        // 初始化答题系统
        function initializeQuiz(questions) {
            allQuestions = questions;
            filteredQuestions = [...questions];
            userAnswers = {};
            currentIndex = 0;
            
            // 更新头部统计
            updateHeaderSummary();
            
            // 初始化答题卡
            renderAnswerCard();
            
            // 显示第一题
            renderQuestion();
            
            // 显示答题区域
            document.getElementById("loading-wrapper").classList.add("hidden");
            document.getElementById("quiz-area").classList.remove("hidden");
        }

        // 更新头部统计
        function updateHeaderSummary() {
            const answered = Object.keys(userAnswers).length;
            const correct = Object.values(userAnswers).filter(a => a.isCorrect).length;
            document.getElementById("header-summary").textContent = `已答: ${answered}/${filteredQuestions.length} | 正确: ${correct}`;
        }

        // 渲染答题卡
        function renderAnswerCard() {
            const grid = document.getElementById("card-grid");
            grid.innerHTML = "";
            
            filteredQuestions.forEach((q, index) => {
                const item = document.createElement("div");
                item.className = "card-item";
                item.textContent = index + 1;
                
                // 添加状态类
                if (userAnswers[q.id]) {
                    item.classList.add(userAnswers[q.id].isCorrect ? "correct" : "wrong");
                }
                
                // 添加当前题目标记
                if (index === currentIndex) {
                    item.classList.add("current");
                }
                
                item.addEventListener("click", () => jumpToQuestion(index));
                grid.appendChild(item);
            });
        }

        // 渲染当前题目
        function renderQuestion() {
            if (filteredQuestions.length === 0) return;
            
            const q = filteredQuestions[currentIndex];
            
            // 更新题目信息
            document.getElementById("question-number").textContent = `第 ${currentIndex + 1} 题`;
            document.getElementById("dimension-tag").textContent = q.dimension;
            document.getElementById("type-tag").textContent = q.typeName;
            document.getElementById("question-title").textContent = q.title;
            
            // 更新选项
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";
            
            const labels = ["A", "B", "C", "D", "E", "F"];
            const userAnswer = userAnswers[q.id];
            const isChecked = userAnswer && userAnswer.isCorrect !== undefined;
            
            q.options.forEach((option, index) => {
                const label = labels[index] || String.fromCharCode(65 + index);
                const isSelected = userAnswer && userAnswer.selected.includes(label);
                
                const optDiv = document.createElement("div");
                optDiv.className = "option-item";
                if (isSelected) optDiv.classList.add("selected");
                if (isChecked) {
                    optDiv.classList.add("disabled");
                    if (q.correct.includes(label)) {
                        optDiv.classList.add("correct");
                    } else if (isSelected) {
                        optDiv.classList.add("wrong");
                    }
                }
                
                optDiv.innerHTML = `
                    <input type="${q.type === 'multiple' ? 'checkbox' : 'radio'}" 
                           class="option-input" 
                           name="option" 
                           id="opt-${index}"
                           ${isSelected ? 'checked' : ''}
                           ${isChecked ? 'disabled' : ''}>
                    <label class="option-text" for="opt-${index}">
                        <strong>${label}.</strong> ${option}
                    </label>
                `;
                
                if (!isChecked) {
                    optDiv.addEventListener("click", () => selectOption(label, q.type));
                }
                
                optionsContainer.appendChild(optDiv);
            });
            
            // 更新解析区域
            const analysisSection = document.getElementById("analysis-section");
            if (isChecked) {
                analysisSection.style.display = "block";
                document.getElementById("analysis-content").textContent = q.analysis;
            } else {
                analysisSection.style.display = "none";
            }
            
            // 更新按钮状态
            document.getElementById("prev-btn").disabled = currentIndex === 0;
            document.getElementById("next-btn").disabled = currentIndex === filteredQuestions.length - 1;
            document.getElementById("check-btn").textContent = isChecked ? "已查看答案" : "查看答案";
            document.getElementById("check-btn").disabled = isChecked;
            
            // 重新渲染答题卡（更新当前题目标记）
            renderAnswerCard();
        }

        // 选择选项
        function selectOption(label, type) {
            const q = filteredQuestions[currentIndex];
            
            if (!userAnswers[q.id]) {
                userAnswers[q.id] = { selected: [], isCorrect: undefined };
            }
            
            const answer = userAnswers[q.id];
            
            if (type === "multiple") {
                // 多选题：切换选择状态
                const idx = answer.selected.indexOf(label);
                if (idx === -1) {
                    answer.selected.push(label);
                } else {
                    answer.selected.splice(idx, 1);
                }
            } else {
                // 单选题：直接选择
                answer.selected = [label];
            }
            
            renderQuestion();
            updateHeaderSummary();
        }

        // 查看答案
        function checkAnswer() {
            const q = filteredQuestions[currentIndex];
            
            if (!userAnswers[q.id] || userAnswers[q.id].selected.length === 0) {
                alert("请先选择答案！");
                return;
            }
            
            const userSelected = userAnswers[q.id].selected;
            const isCorrect = arraysEqual([...userSelected].sort(), [...q.correct].sort());
            userAnswers[q.id].isCorrect = isCorrect;
            
            renderQuestion();
            updateHeaderSummary();
        }

        // 上一题
        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        // 下一题
        function nextQuestion() {
            if (currentIndex < filteredQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        }

        // 跳转到指定题目
        function jumpToQuestion(index) {
            currentIndex = index;
            renderQuestion();
        }

        // 重置答题
        function resetQuiz() {
            if (!confirm("确定要重新开始吗？所有答题记录将被清空。")) return;
            
            userAnswers = {};
            currentIndex = 0;
            renderAnswerCard();
            renderQuestion();
            updateHeaderSummary();
        }

        // 应用筛选
        function applyFilter() {
            filteredQuestions = allQuestions.filter(q => {
                const dimMatch = selectedDimension === "all" || q.dimension === selectedDimension;
                const typeMatch = selectedType === "all" || q.type === selectedType;
                return dimMatch && typeMatch;
            });
            
            if (filteredQuestions.length === 0) {
                alert("没有符合条件的题目，请调整筛选条件");
                filteredQuestions = [...allQuestions];
                return;
            }
            
            userAnswers = {};
            currentIndex = 0;
            renderAnswerCard();
            renderQuestion();
            updateHeaderSummary();
        }

        // 重置筛选
        function resetFilter() {
            selectedDimension = "all";
            selectedType = "all";
            
            document.querySelectorAll("#dimension-tags .tag-item").forEach(t => t.classList.remove("active"));
            document.querySelectorAll("#type-tags .tag-item").forEach(t => t.classList.remove("active"));
            document.querySelector("#dimension-tags .tag-item[data-value='all']").classList.add("active");
            document.querySelector("#type-tags .tag-item[data-value='all']").classList.add("active");
            
            filteredQuestions = [...allQuestions];
            userAnswers = {};
            currentIndex = 0;
            renderAnswerCard();
            renderQuestion();
            updateHeaderSummary();
        }

        // 工具函数：比较两个数组是否相等
        function arraysEqual(a, b) {
            if (a.length !== b.length) return false;
            const sortedA = [...a].sort();
            const sortedB = [...b].sort();
            return sortedA.every((val, idx) => val === sortedB[idx]);
        }
    </script>
</body>
</html>
